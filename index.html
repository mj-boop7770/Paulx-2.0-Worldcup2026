<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PaulX WorldCup2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04080F;color:#F8FAFC;font-family:sans-serif;text-align:center}
header{padding:2rem 1rem;border-bottom:1px solid #7C3AED44}
h1{font-size:2.5rem;font-weight:900;letter-spacing:2px;color:#A78BFA}
p.sub{font-size:.75rem;color:#94A3B8;letter-spacing:.2em;margin-top:.4rem}
.badges{display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap;margin-top:1rem}
.badge{font-size:.65rem;padding:.3rem .8rem;border-radius:999px;border:1px solid #7C3AED44;color:#A78BFA}
nav{display:flex;justify-content:center;gap:.5rem;padding:1rem;flex-wrap:wrap}
button{padding:.5rem 1.2rem;border-radius:8px;border:1px solid #7C3AED44;background:transparent;color:#94A3B8;cursor:pointer;font-size:.75rem;letter-spacing:.1em}
button.active,button:hover{background:#7C3AED;color:#fff;border-color:#7C3AED}
.section{display:none;max-width:900px;margin:0 auto;padding:1rem}
.section.active{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}
.card{background:#7C3AED11;border:1px solid #7C3AED33;border-radius:12px;padding:1rem;text-align:left}
.glabel{font-size:1.3rem;font-weight:900;color:#A78BFA;margin-bottom:.6rem}
.trow{display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid #ffffff08;font-size:.85rem;cursor:pointer}
.trow:hover{color:#A78BFA}
.trow:last-child{border:none}
.rk{font-size:.6rem;color:#94A3B8;background:#ffffff08;padding:.1rem .4rem;border-radius:4px}
.box{background:#7C3AED11;border:1px solid #7C3AED33;border-radius:12px;padding:1.2rem;margin-top:.5rem;text-align:left}
select{width:100%;background:#111827;color:#F8FAFC;border:1px solid #7C3AED44;border-radius:8px;padding:.6rem;font-size:.82rem;margin-bottom:.8rem}
.pbtn{width:100%;padding:.9rem;background:#7C3AED;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.1em}
.result{display:none;margin-top:1rem;background:#111827;border:1px solid #7C3AED33;border-radius:12px;padding:1.2rem}
.score{font-size:2rem;font-weight:900;color:#F59E0B;display:block;text-align:center;margin:.5rem 0}
.prow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin:.8rem 0}
.pc{text-align:center;padding:.7rem .3rem;border-radius:10px;border:1px solid #7C3AED33}
.pc span{display:block;font-size:1.6rem;font-weight:900}
.pc small{font-size:.55rem;color:#94A3B8;letter-spacing:.1em}
.w span{color:#A78BFA}.d span{color:#F59E0B}.l span{color:#06B6D4}
.bars{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-top:.8rem}
.bt{font-size:.6rem;color:#94A3B8;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.4rem}
.bl{display:flex;justify-content:space-between;font-size:.7rem;color:#94A3B8;margin-bottom:.15rem}
.btr{height:4px;background:#ffffff08;border-radius:4px;overflow:hidden;margin-bottom:.4rem}
.bf{height:100%;background:linear-gradient(90deg,#7C3AED,#06B6D4);border-radius:4px}
.dsearch{display:flex;gap:.5rem;margin-bottom:1rem}
.dsearch input{flex:1;background:#111827;border:1px solid #7C3AED44;border-radius:8px;padding:.6rem;color:#F8FAFC;font-size:.85rem;outline:none}
.dsearch button{padding:.6rem 1rem;background:#7C3AED;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer}
.dcard{display:none;background:#7C3AED11;border:1px solid #7C3AED33;border-radius:12px;padding:1.2rem}
.dname{font-size:1.8rem;font-weight:900;color:#A78BFA}
.dmeta{font-size:.65rem;color:#94A3B8;letter-spacing:.1em;margin-bottom:1rem}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.db{background:#111827;border-radius:8px;padding:.8rem}
.dbt{font-size:.58rem;color:#A78BFA;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.4rem}
.db p{font-size:.78rem;color:#94A3B8;line-height:1.5}
footer{padding:1.5rem;font-size:.6rem;color:#94A3B8;border-top:1px solid #7C3AED22;margin-top:2rem}
@media(max-width:480px){.bars,.dgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<svg width="70" height="70" viewBox="0 0 100 100" fill="none">

<path d="M38 58 Q32 72 30 86 Q35 89 37 84 Q38 72 43 62" fill="#7C3AED"/>
<path d="M46 60 Q44 75 44 90 Q48 92 50 88 Q50 74 50 62" fill="#6D28D9"/>
<path d="M54 60 Q56 75 56 90 Q52 92 50 88 Q50 74 50 62" fill="#7C3AED"/>
<path d="M62 58 Q68 72 70 86 Q65 89 63 84 Q62 72 57 62" fill="#6D28D9"/>
<path d="M70 55 Q78 68 82 80 Q78 85 74 80 Q72 70 66 60" fill="#7C3AED"/>

</svg>
<h1>PAULX WORLDCUP2026</h1>
<p class="sub">AI FOOTBALL INTELLIGENCE · 48 NATIONS · 12 GROUPS</p>
<div class="badges">
<span class="badge">USA</span><span class="badge">CANADA</span><span class="badge">MEXICO</span><span class="badge">11 JUN - 19 JUL 2026</span>
</div>
</header>
<nav>
<button class="active" onclick="tab('groups',this)">GROUPS</button>
<button onclick="tab('predict',this)">PREDICT</button>
<button onclick="tab('dossier',this)">DOSSIER</button>
</nav>
<div id="groups" class="section active"><div class="grid" id="gg"></div></div>
<div id="predict" class="section">
<div class="box">
<select id="ta"></select>
<select id="tb"></select>
<button class="pbtn" onclick="predict()">ORACLE - PREDICT MATCH</button>
<div class="result" id="rc">
<div style="display:flex;justify-content:space-between;font-weight:700;font-size:1.1rem">
<span id="rta"></span><span class="score" id="rs"></span><span id="rtb"></span>
</div>
<div class="prow">
<div class="pc w"><span id="pw"></span><small>WIN A</small></div>
<div class="pc d"><span id="pd"></span><small>DRAW</small></div>
<div class="pc l"><span id="pl"></span><small>WIN B</small></div>
</div>
<div class="bars">
<div><div class="bt" id="bat">A</div><div id="bab"></div></div>
<div><div class="bt" id="bbt">B</div><div id="bbb"></div></div>
</div>
</div>
</div>
</div>
<div id="dossier" class="section">
<div class="dsearch"><input id="di" placeholder="France, Brazil, Morocco..."/><button onclick="dos()">OPEN</button></div>
<div class="dcard" id="dc">
<div class="dname" id="dn"></div>
<div class="dmeta" id="dm"></div>
<div class="dgrid">
<div class="db"><div class="dbt">ATTACK</div><p id="da"></p></div>
<div class="db"><div class="dbt">DEFENSE</div><p id="dd"></p></div>
<div class="db"><div class="dbt">FORM</div><p id="df"></p></div>
<div class="db"><div class="dbt">MENTAL</div><p id="dme"></p></div>
<div class="db"><div class="dbt">COACH</div><p id="dc2"></p></div>
<div class="db"><div class="dbt">HISTORY</div><p id="dh"></p></div>
</div>
</div>
</div>
<footer>PaulX-WorldCup2026 · AI Football Oracle · Not affiliated with FIFA</footer>
<script>
var T={"A":[{n:"Mexico",r:15},{n:"South Korea",r:25},{n:"Czechia",r:41},{n:"South Africa",r:60}],"B":[{n:"Switzerland",r:19},{n:"Canada",r:30},{n:"Qatar",r:55},{n:"Bosnia Herzegovina",r:90}],"C":[{n:"Brazil",r:6},{n:"Morocco",r:8},{n:"Scotland",r:43},{n:"Haiti",r:100}],"D":[{n:"USA",r:16},{n:"Turkey",r:22},{n:"Australia",r:27},{n:"Paraguay",r:40}],"E":[{n:"Germany",r:10},{n:"Ecuador",r:23},{n:"Ivory Coast",r:34},{n:"Curacao",r:82}],"F":[{n:"Netherlands",r:7},{n:"Japan",r:18},{n:"Sweden",r:38},{n:"Tunisia",r:44}],"G":[{n:"Belgium",r:9},{n:"Iran",r:21},{n:"Egypt",r:29},{n:"New Zealand",r:85}],"H":[{n:"Spain",r:2},{n:"Uruguay",r:17},{n:"Saudi Arabia",r:61},{n:"Cape Verde",r:69}],"I":[{n:"France",r:1},{n:"Senegal",r:14},{n:"Norway",r:31},{n:"Iraq",r:57}],"J":[{n:"Argentina",r:3},{n:"Austria",r:24},{n:"Algeria",r:28},{n:"Jordan",r:63}],"K":[{n:"Portugal",r:5},{n:"Colombia",r:13},{n:"DR Congo",r:46},{n:"Uzbekistan",r:50}],"L":[{n:"England",r:4},{n:"Croatia",r:11},{n:"Panama",r:33},{n:"Ghana",r:74}]};
var D={france:{g:"I",r:1,a:85,d:82,f:78,m:88,e:90,s:80,c:"Didier Deschamps",h:"World Champion 1998 and 2018. Runner-up 2022."},brazil:{g:"C",r:6,a:84,d:76,f:80,m:82,e:92,s:72,c:"Dorival Junior",h:"5x World Champions. Last title 2002."},argentina:{g:"J",r:3,a:88,d:78,f:85,m:92,e:91,s:88,c:"Lionel Scaloni",h:"World Champions 2022. 3x total titles."},spain:{g:"H",r:2,a:86,d:83,f:82,m:85,e:89,s:85,c:"Luis de la Fuente",h:"World Champion 2010. Euro 2024 winner."},england:{g:"L",r:4,a:82,d:80,f:79,m:80,e:84,s:82,c:"Gareth Southgate",h:"World Champion 1966. Euro 2024 finalist."},portugal:{g:"K",r:5,a:84,d:77,f:81,m:83,e:87,s:78,c:"Roberto Martinez",h:"Euro 2016 winner."},germany:{g:"E",r:10,a:80,d:79,f:76,m:84,e:90,s:80,c:"Julian Nagelsmann",h:"4x World Champions. Last title 2014."},morocco:{g:"C",r:8,a:74,d:84,f:78,m:86,e:72,s:85,c:"Walid Regragui",h:"2022 Semi-finalist. Historic African run."},netherlands:{g:"F",r:7,a:83,d:79,f:80,m:80,e:86,s:78,c:"Ronald Koeman",h:"3x finalist. No WC title yet."},belgium:{g:"G",r:9,a:80,d:76,f:74,m:78,e:84,s:74,c:"Domenico Tedesco",h:"3rd place 2018."},senegal:{g:"I",r:14,a:76,d:77,f:75,m:80,e:70,s:78,c:"Aliou Cisse",h:"AFCON champions 2021 and 2022."},colombia:{g:"K",r:13,a:78,d:74,f:77,m:76,e:76,s:75,c:"Nestor Lorenzo",h:"QF 2014. Copa America 2024 runners-up."},algeria:{g:"J",r:28,a:72,d:74,f:70,m:75,e:68,s:72,c:"Djamel Belmadi",h:"AFCON 2019. WC 2014 round of 16."},mexico:{g:"A",r:15,a:74,d:72,f:71,m:74,e:82,s:70,c:"Javier Aguirre",h:"Host 1970 and 1986. QF best result."},usa:{g:"D",r:16,a:74,d:73,f:76,m:74,e:72,s:78,c:"Mauricio Pochettino",h:"Host and 3rd place 1994."},japan:{g:"F",r:18,a:76,d:75,f:78,m:78,e:76,s:80,c:"Hajime Moriyasu",h:"4x Asian champion. QF 2022."},croatia:{g:"L",r:11,a:78,d:77,f:73,m:82,e:82,s:76,c:"Zlatko Dalic",h:"Runner-up 2018. 3rd place 2022."},uruguay:{g:"H",r:17,a:76,d:78,f:74,m:80,e:84,s:74,c:"Marcelo Bielsa",h:"2x WC winners. SF 2010."}};
function all(){var a=[];Object.keys(T).forEach(function(g){T[g].forEach(function(t){a.push({n:t.n,r:t.r,g:g});});});return a;}
function st(name){var k=name.toLowerCase().replace(/\s+/g,'');if(D[k])return D[k];var t=all().find(function(x){return x.n.toLowerCase()===name.toLowerCase();});var r=t?t.r:50;var b=Math.max(30,Math.round(95-(r-1)*0.9));return{a:b,d:b-3,f:b-5,m:b-2,e:b-4,s:b-6};}
function tab(id,btn){document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});document.querySelectorAll('nav button').forEach(function(b){b.classList.remove('active');});document.getElementById(id).classList.add('active');btn.classList.add('active');}
function renderGroups(){var g=document.getElementById('gg');g.innerHTML='';Object.keys(T).forEach(function(gr){var c=document.createElement('div');c.className='card';var h='<div class="glabel">GROUP '+gr+'</div>';T[gr].forEach(function(t){h+='<div class="trow" onclick="qdos(\''+t.n+'\')"><span>'+t.n+'</span><span class="rk">#'+t.r+'</span></div>';});c.innerHTML=h;g.appendChild(c);});}
function populateSel(){var a=all();var o=a.map(function(t){return '<option value="'+t.n+'">'+t.n+' (G'+t.g+' #'+t.r+')</option>';}).join('');document.getElementById('ta').innerHTML=o;document.getElementById('tb').innerHTML=o;document.getElementById('tb').selectedIndex=1;}
function predict(){var nA=document.getElementById('ta').value,nB=document.getElementById('tb').value;if(nA===nB){alert('Choose 2 different teams!');return;}var sA=st(nA),sB=st(nB);var pA=sA.a*.28+sA.d*.22+sA.f*.2+sA.m*.15+sA.e*.1+sA.s*.05;var pB=sB.a*.28+sB.d*.22+sB.f*.2+sB.m*.15+sB.e*.1+sB.s*.05;var df=pA-pB,wA,dr,wB;if(Math.abs(df)<3){wA=33;dr=34;wB=33;}else if(df>0){wA=Math.min(72,Math.round(42+df*1.4));dr=Math.max(8,Math.round(22-df*.5));wB=100-wA-dr;}else{wB=Math.min(72,Math.round(42+Math.abs(df)*1.4));dr=Math.max(8,Math.round(22-Math.abs(df)*.5));wA=100-wB-dr;}wA=Math.max(5,wA);wB=Math.max(5,wB);var gA=Math.max(0,Math.round(sA.a/100*2.4-sB.d/100*.8+.5));var gB=Math.max(0,Math.round(sB.a/100*2.4-sA.d/100*.8+.5));document.getElementById('rta').textContent=nA;document.getElementById('rtb').textContent=nB;document.getElementById('rs').textContent=gA+' - '+gB;document.getElementById('pw').textContent=wA+'%';document.getElementById('pd').textContent=dr+'%';document.getElementById('pl').textContent=wB+'%';bars('bat','bab',nA,sA);bars('bbt','bbb',nB,sB);document.getElementById('rc').style.display='block';}
function bars(ti,bi,n,s){document.getElementById(ti).textContent=n.toUpperCase();var ks=[['a','Attack'],['d','Defense'],['f','Form'],['m','Mental'],['e','Experience'],['s','Stability']];document.getElementById(bi).innerHTML=ks.map(function(k){return '<div class="bl"><span>'+k[1]+'</span><span>'+s[k[0]]+'</span></div><div class="btr"><div class="bf" style="width:'+s[k[0]]+'%"></div></div>';}).join('');}
function dos(){var v=document.getElementById('di').value.trim();if(v)showDos(v);}
function qdos(n){document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});document.querySelectorAll('nav button').forEach(function(b){b.classList.remove('active');});document.getElementById('dossier').classList.add('active');document.querySelectorAll('nav button')[2].classList.add('active');document.getElementById('di').value=n;showDos(n);}
function showDos(n){var t=all().find(function(x){return x.n.toLowerCase().indexOf(n.toLowerCase())>=0;});if(!t){alert('Not found. Try: France, Brazil...');return;}var s=st(t.n);document.getElementById('dn').textContent=t.n.toUpperCase();document.getElementById('dm').textContent='GROUP '+t.g+' - FIFA RANK #'+t.r;document.getElementById('da').textContent='Score: '+s.a+'/100';document.getElementById('dd').textContent='Score: '+s.d+'/100';document.getElementById('df').textContent='Score: '+s.f+'/100';document.getElementById('dme').textContent='Score: '+s.m+'/100';document.getElementById('dc2').textContent=s.c||'Coming soon';document.getElementById('dh').textContent=s.h||'Coming soon';document.getElementById('dc').style.display='block';}
window.addEventListener('DOMContentLoaded',function(){renderGroups();populateSel();});
</script>
</body>
  </html>
