name: Update WorldCup2026 Data

on:
  schedule:
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python update_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "MUJOS Octopus Bot"
          git config user.email "bot@worldcup2026.mujos"
          git add data/2026.json data/messages.json
          git diff --staged --quiet || git commit -m "Auto-update data $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
